limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/h;

upstream nextjs_upstream {
    server nextjs:3000;
}

upstream hono_upstream {
    server hono:4000;
}

server {
    listen 80;
    server_name weecommerce.web.id www.weecommerce.web.id;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name weecommerce.web.id;

    # SSL — managed by Dokploy or Certbot
    ssl_certificate /etc/letsencrypt/live/weecommerce.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/weecommerce.web.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data: blob:; font-src 'self' data:; connect-src 'self' https://plausible.io https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

    server_tokens off;

    # Frontend
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        limit_req zone=general burst=20 nodelay;
    }

    # API
    location /api/ {
        proxy_pass http://hono_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        limit_req zone=general burst=20 nodelay;
    }

    # Contact form (stricter)
    location = /api/v1/contact {
        proxy_pass http://hono_upstream;
        limit_req zone=contact burst=2 nodelay;
    }

    # GEO / SEO files
    location ~ ^/(sitemap|robots|feed|llms|ai-sitemap) {
        proxy_pass http://hono_upstream;
        proxy_set_header Host $host;
    }

    # Health
    location /health {
        proxy_pass http://nextjs_upstream/health;
        access_log off;
    }
}
